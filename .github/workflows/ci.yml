name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript 체크
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: 빌드
        run: npm run build
